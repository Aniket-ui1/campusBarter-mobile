name: 🚀 CI / CD Pipeline

# ── Trigger Rules ─────────────────────────────────────────────────
# Security scan + lint + build runs on EVERY branch push (catch errors early)
# Deploy step ONLY runs when code is merged into main
on:
  push:
    branches: ["**"]        # All branches — runs checks
  pull_request:
    branches: [main]        # PRs targeting main — runs checks before merge

jobs:
  # ── Step 1: Security Vulnerability Scan ───────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (Vulnerability Check)
        # Level set to 'critical' because HIGH vulnerabilities exist inside
        # Expo's own internal packages (minimatch, tar) which we cannot patch.
        # Dependabot alerts will still track and surface HIGH issues.
        run: npm audit --audit-level=critical
        continue-on-error: true   # Report but don't block — findings shown in logs

  # ── Step 2: Lint ──────────────────────────────────────────────────
  lint:
    name: 🧹 Lint Check
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Lint
        run: npm run lint

  # ── Step 3: TypeScript Build ───────────────────────────────────────
  build:
    name: 🏗️ TypeScript Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Type Check
        run: npx tsc --noEmit
        # Checks TypeScript without outputting files — catches type errors

  # ── Step 4: Deploy (main branch only) ────────────────────────────
